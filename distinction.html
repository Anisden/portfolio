<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presse & Distinctions | Anis BOUDEN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css" />
  <link class="page-css" rel="stylesheet" href="./src/distinction-page.css" />
</head>
<body>
  <!-- CAD Blueprint Background Canvas -->
  <canvas id="blueprint-canvas"></canvas>

  <!-- Navigation (Exactly identical to homepage navbar) -->
  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <a href="./" class="logo" id="site-logo">A<span>BOUDEN</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="./#about" data-i18n="navAbout">À Propos</a></li>
        <li><a href="./#experience" data-i18n="navExperience">Parcours</a></li>
        <li><a href="./#distinctions" data-i18n="navDistinctions">Distinctions</a></li>
        <li><a href="./#projects" data-i18n="navProjects">Projets</a></li>
        <li><a href="./#contact" data-i18n="navContact">Contact</a></li>
      </ul>
      
      <!-- Language Selector -->
      <div class="lang-selector">
        <button class="lang-btn" id="lang-btn" aria-label="Select Language">
          <span>🌐</span>
          <span id="current-lang">FR</span>
          <span>▼</span>
        </button>
        <div class="lang-dropdown" id="lang-dropdown">
          <button class="lang-opt active" data-lang="fr">FR</button>
          <button class="lang-opt" data-lang="en">EN</button>
          <button class="lang-opt" data-lang="ar">AR</button>
        </div>
      </div>

      <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Page Header -->
  <header class="dist-page-header">
    <div class="dist-header-deco"></div>
    <div class="container">
      <p class="dist-page-label" data-i18n="navProjects">Portfolio</p>
      <h1 class="dist-page-title" data-i18n="awardsLabel">Presse & Distinctions</h1>
      <div class="dist-page-divider"></div>
    </div>
  </header>

  <!-- All Distinctions -->
  <main class="dist-page-body">
    <div class="container" id="distinctions-container">
      <section id="awards-section" class="dist-section">
        <h2 class="dist-section-title" data-i18n="distinctionsTitle">Prix & Concours</h2>
        <div class="dist-section-grid" id="awards-grid"></div>
      </section>
      
      <section id="press-section" class="dist-section">
        <h2 class="dist-section-title" data-i18n="pressSectionTitle">La presse parle de moi</h2>
        <div class="dist-section-grid press-grid" id="press-grid"></div>
      </section>

      <section id="media-section" class="dist-section">
        <h2 class="dist-section-title" data-i18n="mediaSectionTitle">Interventions Médias</h2>
        <div class="dist-section-grid media-grid" id="media-grid"></div>
      </section>
    </div>
  </main>

  <footer>
    <div class="container footer-inner">
      <p class="footer-copy">&copy; <span id="year"></span> <span data-i18n="footerText">Anis Bouden. Conçu avec passion & propulsé par des outils IA.</span></p>
    </div>
  </footer>

  <script type="module" src="./src/distinction.js"></script>
</body>
</html>
